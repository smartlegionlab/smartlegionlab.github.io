name: Update Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jinja2 markdown pygments

      - name: Fetch GitHub repos
        run: python scripts/fetch_github.py
        continue-on-error: true

      - name: Fetch Dev.to articles
        run: python scripts/fetch_devto.py
        continue-on-error: true

      - name: Fetch PyPI packages
        run: python scripts/fetch_pypi.py
        continue-on-error: true

      - name: Generate HTML pages
        run: python scripts/generate_pages.py

      - name: Generate repository detail pages
        run: python scripts/generate_repo_pages.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add --all

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update data and pages $(date +'%Y-%m-%d')"
            git push
          fi
