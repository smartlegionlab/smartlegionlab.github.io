<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ name }} v{{ version }} - PyPI Package</title>
    <meta name="description" content="{{ summary|truncate(160) }}">

    <link rel="canonical" href="https://smartlegionlab.ru/packages/{{ name }}.html">
    <link rel="author" href="https://github.com/smartlegionlab">

    <meta property="og:title" content="{{ name }} v{{ version }} - PyPI Package">
    <meta property="og:description" content="{{ summary|truncate(160) }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://smartlegionlab.ru/packages/{{ name }}.html">
    <meta property="og:site_name" content="Smart Legion Lab">

    <meta name="theme-color" content="#0d1117">

    <link href="../css/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/bootstrap/bootstrap_icons/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233775A9'/><stop offset='100%' stop-color='%232D5A8B'/></linearGradient></defs><circle cx='50' cy='40' r='20' fill='url(%23grad)' stroke='%23ffffff' stroke-width='2'/><path d='M50 60 L50 85 M35 70 L65 70' stroke='%23ffffff' stroke-width='4' stroke-linecap='round'/></svg>">

    <style>
        .package-detail-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--accent);
        }
        .version-badge {
            background: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
        }
        .stat-large {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-item {
            padding: 1rem;
            background: var(--secondary);
            border-radius: 8px;
            text-align: center;
            transition: transform 0.2s;
        }
        .info-item:hover {
            transform: translateY(-2px);
            background: var(--primary);
        }
        .pypi-badge {
            display: inline-block;
            background: #3775A9;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 0.25rem;
            text-decoration: none;
        }
        .pypi-badge:hover {
            background: #2D5A8B;
            color: white;
        }
        .markdown-content {
            background: var(--secondary);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
            overflow-x: auto;
        }
        .markdown-content pre {
            background: var(--primary);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            overflow-x: auto;
        }
        .markdown-content code {
            background: var(--primary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: var(--accent);
            font-family: 'Courier New', monospace;
        }
        .markdown-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4 {
            color: var(--accent);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .markdown-content h1 {
            font-size: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .markdown-content h2 {
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.3rem;
        }
        .markdown-content h1:first-child,
        .markdown-content h2:first-child,
        .markdown-content h3:first-child {
            margin-top: 0;
        }
        .markdown-content img {
            max-width: 100%;
            border-radius: 8px;
        }
        .markdown-content table {
            width: 100%;
            margin: 1rem 0;
            border-collapse: collapse;
        }
        .markdown-content th {
            background: var(--primary);
            color: var(--accent);
            padding: 0.5rem;
            border: 1px solid var(--border);
        }
        .markdown-content td {
            padding: 0.5rem;
            border: 1px solid var(--border);
        }
        .markdown-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            color: var(--text-muted);
            font-style: italic;
            margin: 1rem 0;
        }
        .markdown-content ul,
        .markdown-content ol {
            padding-left: 1.5rem;
            margin: 1rem 0;
        }
        .markdown-content li {
            margin: 0.25rem 0;
        }
        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="scroll-progress">
        <div class="scroll-progress-bar"></div>
    </div>

    <button class="scroll-to-top" id="scrollToTop">
        <i class="bi bi-chevron-up"></i>
    </button>

    <div class="container">
        <div class="paper-container">

            <header class="professional-header">
                <div class="container">
                    <div class="header-content">
                        <div class="main-profile-row">
                            <div class="avatar-container">
                                <div class="profile-avatar">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-box-seam" viewBox="0 0 16 16">
                                        <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5l2.404.961L10.404 2l-2.218-.887zm3.564 1.426L5.596 5 8 5.961 14.154 3.5l-2.404-.961zm3.25 1.7-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="profile-info">
                                <h1 class="name">{{ name }}</h1>
                                <p class="title">PyPI Package v{{ version }}</p>
                                <div class="badges mt-2">
                                    <span class="version-badge">{{ version }}</span>
                                    <span class="badge bg-primary">Python</span>
                                    {% if error is defined and error %}
                                        <span class="badge bg-warning">Error</span>
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main style="padding: 5px">
                <nav class="mobile-navigation" id="mobileNav">
                    <div class="mobile-nav-container">
                        <a href="/" class="mobile-nav-btn" aria-label="Go to Home page">
                            <i class="bi bi-house" aria-hidden="true"></i>
                        </a>
                        <a href="/about.html" class="mobile-nav-btn" aria-label="Go to About page">
                            <i class="bi bi-person" aria-hidden="true"></i>
                        </a>
                        <a href="/skills.html" class="mobile-nav-btn" aria-label="Go to Skills page">
                            <i class="bi bi-gear" aria-hidden="true"></i>
                        </a>
                        <a href="/projects.html" class="mobile-nav-btn" aria-label="Go to Projects page">
                            <i class="bi bi-github" aria-hidden="true"></i>
                        </a>
                        <a href="/research.html" class="mobile-nav-btn" aria-label="Go to Research page">
                            <i class="bi bi-journal-text" aria-hidden="true"></i>
                        </a>
                        <a href="/packages.html" class="mobile-nav-btn" aria-label="Go to Packages page">
                            <i class="bi bi-box-seam" aria-hidden="true"></i>
                        </a>
                        <a href="/articles.html" class="mobile-nav-btn" aria-label="Go to Articles page">
                            <i class="bi bi-file-text" aria-hidden="true"></i>
                        </a>
                    </div>
                </nav>
                <br>

                <div class="content-section">
                    <div class="container">
                        <div class="d-flex justify-content-between align-items-center package-detail-header">
                            <h2 class="section-title mb-0">Package Details</h2>
                            <a href="{{ project_url }}" target="_blank" class="btn btn-outline-primary">
                                <i class="bi bi-box-seam"></i> View on PyPI
                            </a>
                        </div>

                        <div class="about-card">
                            <h3 class="about-title">
                                <i class="bi bi-info-circle"></i> Summary
                            </h3>
                            <p class="text-light">{{ summary }}</p>
                        </div>

                        <div class="about-card">
                            <h3 class="about-title">
                                <i class="bi bi-file-text"></i> Description
                            </h3>
                            <div class="markdown-content">
                                {{ description|markdown|safe }}
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <a href="/packages.html" class="btn btn-outline-primary">
                                <i class="bi bi-arrow-left"></i> Back to Packages
                            </a>
                        </div>
                    </div>
                </div>

                <div class="content-section">
                    <div class="container text-center">
                        <footer>
                            <p class="text-muted">
                                © <span id="currentYear"></span> <a target="_blank" href="https://github.com/smartlegionlab">Alexander Suvorov</a>
                            </p>
                        </footer>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../css/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../js/particle-background.js"></script>
    <script src="../js/scroll-manager.js"></script>
    <script src="../js/animation-manager.js"></script>
    <script src="../js/active-nav.js"></script>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof ScrollManager !== 'undefined') {
                new ScrollManager();
            } else {
                console.error('ScrollManager not found');
            }
        });
    </script>
</body>
</html>
